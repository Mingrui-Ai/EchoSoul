# EchoSoul local override configuration
# Copy the keys you need into a root-level config.properties file.

app.name=EchoSoul
app.version=0.1.0

ai.provider.preset=DEEPSEEK
ai.protocol=OPENAI_COMPATIBLE
ai.api.key=
ai.base.url=https://api.deepseek.com/v1/chat/completions
ai.model=deepseek-chat

temperature=0.7
max_tokens=150
connect.timeout=15
read.timeout=60
write.timeout=60

history.limit=20
history.maxSessions=100
history.savePath=./history
history.autoSave=false

sidebar.collapsed=true
tts.autoplay=false
user.avatar.path=/images/user_avatar.png

baidu.app.id=
baidu.api.key=
baidu.secret.key=
