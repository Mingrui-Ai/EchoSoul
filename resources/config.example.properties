# Default public configuration bundled inside the application.
# A writable config.properties file will be created next to the app on first launch.

app.name=EchoSoul
app.version=0.1.0

deepseek.api.key=
deepseek.api.url=https://api.deepseek.com/v1/chat/completions

temperature=0.7
max_tokens=150
connect.timeout=15
read.timeout=60
write.timeout=60

history.limit=20
history.maxSessions=100
history.savePath=./history
history.autoSave=false

sidebar.collapsed=true
tts.autoplay=false
user.avatar.path=/images/user_avatar.png

baidu.app.id=
baidu.api.key=
baidu.secret.key=
